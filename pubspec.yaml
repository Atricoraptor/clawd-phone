name: clawd_phone
description: AI phone assistant with local access to files, contacts, calendar, device info, and a writable workspace.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'
  flutter: '>=3.16.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Secure storage for API key
  flutter_secure_storage: ^9.2.2

  # HTTP client (for Claude API - no SDK dependency)
  http: ^1.2.1

  # File picking (SAF)
  file_picker: ^8.0.7

  # Permissions
  permission_handler: ^11.3.1

  # Utilities
  uuid: ^4.4.2
  intl: ^0.19.0
  path_provider: ^2.1.4
  share_plus: ^9.0.0
  url_launcher: ^6.3.0
  image_picker: ^1.1.2

  # UI
  google_fonts: ^6.2.1
  flutter_markdown: ^0.7.3
  shimmer: ^3.0.0
  csv: ^6.0.0
  webview_flutter: ^4.8.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
